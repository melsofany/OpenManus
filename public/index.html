<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manus - Web Interface</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="loginContainer" class="login-container">
        <div class="login-box">
            <div class="login-header">
                <svg class="manus-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                    <path d="M12 7V17M7 12H17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <h1>Manus</h1>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <input type="password" id="password" name="password" required placeholder="أدخل كلمة المرور">
                </div>
                <button type="submit" class="login-btn">دخول</button>
                <div id="loginError" class="error-message"></div>
            </form>
        </div>
    </div>

    <!-- Main Application -->
    <div id="appContainer" class="app-container" style="display: none;">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <svg class="sidebar-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M12 7V17M7 12H17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span>Manus</span>
            </div>
            
            <button class="new-task-btn" onclick="newTask()">
                <span class="icon">+</span>
                مهمة جديدة
            </button>

            <div class="conversations-section">
                <div class="section-title">المحادثات</div>
                <div id="conversationsList" class="conversations-list">
                    <div class="conversation-item active" onclick="selectConversation(1)">
                        <div class="conv-icon">📋</div>
                        <div class="conv-info">
                            <div class="conv-title">المحادثة الأولى</div>
                            <div class="conv-subtitle">منذ يومين</div>
                        </div>
                    </div>
                    <div class="conversation-item" onclick="selectConversation(2)">
                        <div class="conv-icon">📝</div>
                        <div class="conv-info">
                            <div class="conv-title">المحادثة الثانية</div>
                            <div class="conv-subtitle">منذ أسبوع</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Chat Area -->
            <div class="chat-container">
                <div class="chat-header">
                    <div class="header-title">
                        <h2 id="chatTitle">المحادثة الأولى</h2>
                    </div>
                    <div class="header-actions">
                        <button class="header-btn" title="المشاركة">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                                <polyline points="16 6 12 2 8 6"></polyline>
                                <line x1="12" y1="2" x2="12" y2="15"></line>
                            </svg>
                        </button>
                    </div>
                </div>

                <div id="chatMessages" class="chat-messages">
                    <div class="message-group">
                        <div class="message user-message">
                            <div class="message-content">
                                <p>مرحبا، كيف يمكنك مساعدتي؟</p>
                            </div>
                        </div>
                    </div>
                    <div class="message-group">
                        <div class="message agent-message">
                            <div class="message-avatar">🤖</div>
                            <div class="message-content">
                                <p>مرحباً! أنا هنا لمساعدتك. يمكنك أن تطلب مني أي شيء وسأحاول تنفيذه بأفضل طريقة ممكنة.</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Execution Steps -->
                <div class="execution-panel">
                    <div class="panel-header">
                        <h3>خطوات التنفيذ</h3>
                    </div>
                    <div id="executionSteps" class="steps-list">
                        <div class="step-item completed">
                            <div class="step-number">✓</div>
                            <div class="step-content">
                                <div class="step-title">تحليل الأمر</div>
                                <div class="step-description">تم فهم الأمر بنجاح</div>
                            </div>
                        </div>
                        <div class="step-item completed">
                            <div class="step-number">✓</div>
                            <div class="step-content">
                                <div class="step-title">معالجة الطلب</div>
                                <div class="step-description">جاري معالجة الطلب...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Input Area (Fixed at bottom) -->
    <div id="inputArea" class="input-area" style="display: none;">
        <form id="commandForm" class="command-form">
            <div class="input-wrapper">
                <input type="text" id="commandInput" placeholder="ماذا تريد مني أن أفعل؟" required>
                <button type="submit" class="send-btn" title="إرسال">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </form>
    </div>

    <script src="/app.js"></script>
</body>
</html>
